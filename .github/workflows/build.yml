name: Build Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Aciona também ao criar tags como v1.0.0
  pull_request:
    branches:
      - main
  workflow_dispatch: # Permite rodar o workflow manualmente pela aba Actions

jobs:
  build:
    runs-on: windows-latest # Precisamos rodar no Windows para compilar um .exe do Windows
    permissions:
      contents: write # Necessário para criar Releases no GitHub

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconsole --onefile main.py

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Py-DNS-Changer-EXE
          path: dist/main.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/main.exe
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
