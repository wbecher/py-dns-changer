name: Build Executable

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Permite rodar o workflow manualmente pela aba Actions

jobs:
  build:
    runs-on: windows-latest # Precisamos rodar no Windows para compilar um .exe do Windows

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconsole --onefile main.py

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Py-DNS-Changer-EXE
          path: dist/main.exe
          if-no-files-found: error
